<!DOCTYPE html>

    <title>Admin Dashboard</title>

<body>
    <div class="dashboard-container">
        <div class="header">
            <div class="header-search-wrapper">
                <button>
                    <img src="icons/magnify.svg" alt="search icon" width="20" height="20">
                </button>
                <input type="search">
            </div>
            <div class="header-user">
                <button>
                    <img src="icons/bell-ring-outline.svg" alt="ringing bell" width="20" height="20">
                </button>
                <button>
                    <img src="" alt="user icon" width="20" height="20">
                </button>
                <span class="user-name">Test Name</span>
            </div>
            <div class="header-welcome">
                <button class="welcome-user-icon">
                    <img src="" alt="user icon" width="60" height="60">
                </button>
                <span class="greeting-sub">test1</span>
                <span class="greeting-main">User Name</span>
            </div>
            <div class="header-actions">
                <button>New</button>
                <button>Upload</button>
                <button>Share</button>
            </div>
        </div>

                <button class="nav-button"><img src="icons/home.svg" alt="outline of house" width="30"
                        height="30"><span>Home</span></button>

                        height="30"><span>Tasks</span></button>
                <button class="nav-button"><img src="icons/account-group.svg" alt="a group of people" width="30"
                        height="30"><span>Communities</span></button>

            <nav class="nav-group-settings">
